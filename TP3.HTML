<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Amine | Mode en Ligne</title>
    <style>
        /* ??????? CSS ???? ?????? ???? ????????? */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #232f3e; /* ??? ???? ?????? */
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 15px;
            width: 250px;
            text-align: center;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .card h3 {
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .card p {
            color: #b12704; /* ??? ????? */
            font-weight: bold;
            font-size: 1.1rem;
        }
        .btn-buy {
            background-color: #ffd814;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #232f3e;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Boutique Amine</h1>
    <p>Le meilleur de la mode aux meilleurs prix</p>
</header>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=500" alt="T-shirt Blanc">
        <h3>T-shirt Classique</h3>
        <p>15.99 €</p>
        <button class="btn-buy">Ajouter au panier</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542272604-787c38ad5551?q=80&w=500" alt="Jean Bleu">
        <h3>Jean Slim Fit</h3>
        <p>39.90 €</p>
        <button class="btn-buy">Ajouter au panier</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=500" alt="Veste d'hiver">
        <h3>Veste d'hiver Luxe</h3>
        <p>85.00 €</p>
        <button class="btn-buy">Ajouter au panier</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=500" alt="Robe d'été">
        <h3>Robe d'été Fleurie</h3>
        <p>29.99 €</p>
        <button class="btn-buy">Ajouter au panier</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 Boutique Amine - Tous droits réservés</p>
</footer>

</body>
</html>
